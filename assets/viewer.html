<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Protein Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0D0D1A; overflow: hidden; width: 100vw; height: 100vh; }
  canvas { display: block; }

  #tooltip {
    position: fixed;
    background: rgba(0,212,255,0.15);
    border: 1px solid rgba(0,212,255,0.5);
    border-radius: 10px;
    padding: 10px 14px;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 13px;
    pointer-events: none;
    display: none;
    backdrop-filter: blur(10px);
    z-index: 100;
    min-width: 120px;
  }
  #tooltip .element { font-size: 22px; font-weight: bold; color: #00D4FF; }
  #tooltip .label { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 2px; }

  #info {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.3);
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 11px;
    pointer-events: none;
    text-align: center;
  }
</style>
</head>
<body>
<div id="tooltip">
  <div class="element" id="tt-element">C</div>
  <div class="label" id="tt-name">Carbon</div>
  <div class="label" id="tt-coords"></div>
</div>
<div id="info">Drag to rotate · Pinch to zoom · Tap atom for info</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── CPK Color scheme ──────────────────────────────────────────────────────────
const CPK_COLORS = {
  H:  0xFFFFFF, C:  0x404040, N:  0x3050F8, O:  0xFF0D0D,
  F:  0x90E050, CL: 0x1FF01F, BR: 0xA62929, I:  0x940094,
  S:  0xFFFF30, P:  0xFF8000, FE: 0xE06633, CA: 0x3DFF00,
  MG: 0x8AFF00, ZN: 0x7D80B0, CU: 0xFF8040, NA: 0xAB5CF2,
  K:  0x8F40D4, DEFAULT: 0xFF69B4,
};

const ELEMENT_NAMES = {
  H:'Hydrogen', C:'Carbon', N:'Nitrogen', O:'Oxygen', S:'Sulfur',
  P:'Phosphorus', F:'Fluorine', CL:'Chlorine', BR:'Bromine', I:'Iodine',
  FE:'Iron', CA:'Calcium', MG:'Magnesium', ZN:'Zinc', CU:'Copper',
  NA:'Sodium', K:'Potassium',
};

function cpkColor(element) {
  return CPK_COLORS[(element || '').toUpperCase()] ?? CPK_COLORS.DEFAULT;
}

// ── Scene setup ───────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0D0D1A);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 20);

// Lighting
scene.add(new THREE.AmbientLight(0xffffff, 0.4));

const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight1.position.set(5, 10, 7);
scene.add(dirLight1);

const dirLight2 = new THREE.DirectionalLight(0x4499ff, 0.3);
dirLight2.position.set(-5, -5, -5);
scene.add(dirLight2);

const pointLight = new THREE.PointLight(0x00D4FF, 0.5, 50);
pointLight.position.set(0, 5, 5);
scene.add(pointLight);

// ── State ─────────────────────────────────────────────────────────────────────
let moleculeGroup = null;
let atomMeshes = [];
let isDragging = false;
let previousTouch = null;
let pinchStartDist = 0;
let cameraZ = 20;
let pinchStartCenter = null;     // midpoint between two fingers, for pan
let cameraTarget = new THREE.Vector3(0, 0, 0); // where the camera looks (pannable)

// ── Build molecule ────────────────────────────────────────────────────────────
// Expects: { atoms: [{atomId, element, x, y, z}], bonds: [{atom1Id, atom2Id, bondOrder}] }
// Recursively disposes geometries and materials so the GPU doesn't
// accumulate orphaned buffers every time a new ligand is loaded.
function disposeGroup(group) {
  if (!group) return;
  group.traverse(obj => {
    if (obj.geometry) obj.geometry.dispose();
    if (obj.material) {
      if (Array.isArray(obj.material)) {
        obj.material.forEach(m => m.dispose());
      } else {
        obj.material.dispose();
      }
    }
  });
}

function buildMolecule(ligandData) {
  if (moleculeGroup) {
    scene.remove(moleculeGroup);
    disposeGroup(moleculeGroup);
  }
  atomMeshes = [];

  moleculeGroup = new THREE.Group();
  const atoms = ligandData.atoms || [];
  const bonds = ligandData.bonds || [];

  const atomMap = {};
  atoms.forEach(atom => { atomMap[atom.atomId] = atom; });

  let cx = 0, cy = 0, cz = 0;
  atoms.forEach(a => { cx += a.x; cy += a.y; cz += a.z; });
  if (atoms.length > 0) { cx /= atoms.length; cy /= atoms.length; cz /= atoms.length; }

  const scale = 1.2;

  // Bonds first (rendered behind atoms)
  bonds.forEach(bond => {
    const a1 = atomMap[bond.atom1Id];
    const a2 = atomMap[bond.atom2Id];
    if (!a1 || !a2) return;

    const p1 = new THREE.Vector3((a1.x - cx)*scale, (a1.y - cy)*scale, (a1.z - cz)*scale);
    const p2 = new THREE.Vector3((a2.x - cx)*scale, (a2.y - cy)*scale, (a2.z - cz)*scale);

    const order = (bond.bondOrder || 'SING').toUpperCase();
    const bondCount = order === 'DOUB' ? 2 : order === 'TRIP' ? 3 : 1;
    const offset = bondCount > 1 ? 0.12 : 0;

    for (let b = 0; b < bondCount; b++) {
      const dir = new THREE.Vector3().subVectors(p2, p1);
      const length = dir.length();
      if (length < 0.001) continue;

      const mid = new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5);
      let bOffset = new THREE.Vector3(0, 0, 0);
      if (bondCount > 1) {
        const perp = new THREE.Vector3().crossVectors(dir.clone().normalize(), new THREE.Vector3(0, 0, 1)).normalize();
        bOffset = perp.multiplyScalar((b - (bondCount - 1) / 2) * offset * 0.5);
      }

      const geo = new THREE.CylinderGeometry(0.06, 0.06, length, 8);
      const mat = new THREE.MeshPhongMaterial({ color: 0xaaaaaa, shininess: 60, specular: 0x333333 });
      const cylinder = new THREE.Mesh(geo, mat);
      cylinder.position.copy(mid).add(bOffset);
      cylinder.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.clone().normalize());
      moleculeGroup.add(cylinder);
    }
  });

  // Atoms
  atoms.forEach(atom => {
    const element = (atom.element || '').trim();
    const color = cpkColor(element);
    const upper = element.toUpperCase();
    const radius = upper === 'H' ? 0.22 : upper === 'C' ? 0.35 : 0.32;

    const geo = new THREE.SphereGeometry(radius, 20, 20);
    const mat = new THREE.MeshPhongMaterial({ color: color, shininess: 80, specular: 0x444444 });
    const sphere = new THREE.Mesh(geo, mat);
    sphere.position.set((atom.x - cx)*scale, (atom.y - cy)*scale, (atom.z - cz)*scale);

    moleculeGroup.add(sphere);
    atomMeshes.push({ mesh: sphere, atom });
  });

  const box = new THREE.Box3().setFromObject(moleculeGroup);
  const size = box.getSize(new THREE.Vector3()).length();
  cameraZ = Math.max(size * 1.8, 8);
  camera.position.z = cameraZ;

  scene.add(moleculeGroup);
}

// ── Raycasting for atom tap ───────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
const tooltip = document.getElementById('tooltip');

function onAtomTap(x, y) {
  pointer.x = (x / window.innerWidth) * 2 - 1;
  pointer.y = -(y / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObjects(atomMeshes.map(a => a.mesh));

  if (hits.length > 0) {
    const hitMesh = hits[0].object;
    const entry = atomMeshes.find(a => a.mesh === hitMesh);
    if (entry) showTooltip(entry.atom, x, y);
  } else {
    hideTooltip();
  }
}

function showTooltip(atom, x, y) {
  const el = (atom.element || '').trim();
  document.getElementById('tt-element').textContent = el;
  document.getElementById('tt-name').textContent = ELEMENT_NAMES[el.toUpperCase()] || el;
  document.getElementById('tt-coords').textContent =
    `${atom.atomId}  (${atom.x.toFixed(2)}, ${atom.y.toFixed(2)}, ${atom.z.toFixed(2)})`;

  const tw = 160, th = 70;
  let tx = x + 14;
  let ty = y - th / 2;
  if (tx + tw > window.innerWidth) tx = x - tw - 14;
  if (ty < 8) ty = 8;
  if (ty + th > window.innerHeight - 8) ty = window.innerHeight - th - 8;

  tooltip.style.left = tx + 'px';
  tooltip.style.top = ty + 'px';
  tooltip.style.display = 'block';

  if (window.AtomInfo) {
    window.AtomInfo.postMessage(JSON.stringify({ element: el, atomId: atom.atomId }));
  }
}

function hideTooltip() { tooltip.style.display = 'none'; }

// ── Touch / Mouse controls ────────────────────────────────────────────────────
let touchStartX = 0, touchStartY = 0, touchStartTime = 0;
const TAP_THRESHOLD = 10;
const TAP_TIME = 250;

renderer.domElement.addEventListener('touchstart', e => {
  e.preventDefault();
  hideTooltip();

  if (e.touches.length === 1) {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    touchStartTime = Date.now();
    previousTouch = { x: touchStartX, y: touchStartY };
    isDragging = true;
  } else if (e.touches.length === 2) {
    isDragging = false;
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    pinchStartDist = Math.sqrt(dx*dx + dy*dy);
    pinchStartCenter = {
      x: (e.touches[0].clientX + e.touches[1].clientX) / 2,
      y: (e.touches[0].clientY + e.touches[1].clientY) / 2,
    };
  }
}, { passive: false });

renderer.domElement.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && isDragging && moleculeGroup) {
    const dx = e.touches[0].clientX - previousTouch.x;
    const dy = e.touches[0].clientY - previousTouch.y;
    moleculeGroup.rotation.y += dx * 0.01;
    moleculeGroup.rotation.x += dy * 0.01;
    previousTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  } else if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const delta = (pinchStartDist - dist) * 0.05;
    cameraZ = Math.max(3, Math.min(80, cameraZ + delta));
    camera.position.z = cameraZ;
    pinchStartDist = dist;

    // Two-finger pan: move the camera (and what it looks at) sideways
    // based on how the midpoint between the two fingers has moved.
    const center = {
      x: (e.touches[0].clientX + e.touches[1].clientX) / 2,
      y: (e.touches[0].clientY + e.touches[1].clientY) / 2,
    };
    if (pinchStartCenter) {
      const panX = (center.x - pinchStartCenter.x) * 0.02;
      const panY = (center.y - pinchStartCenter.y) * 0.02;
      camera.position.x -= panX;
      camera.position.y += panY;
      cameraTarget.x -= panX;
      cameraTarget.y += panY;
      camera.lookAt(cameraTarget);
    }
    pinchStartCenter = center;
  }
}, { passive: false });

renderer.domElement.addEventListener('touchend', e => {
  if (e.changedTouches.length === 1) {
    const dx = Math.abs(e.changedTouches[0].clientX - touchStartX);
    const dy = Math.abs(e.changedTouches[0].clientY - touchStartY);
    const dt = Date.now() - touchStartTime;
    if (dx < TAP_THRESHOLD && dy < TAP_THRESHOLD && dt < TAP_TIME) {
      onAtomTap(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
    }
  }
  isDragging = false;
  previousTouch = null;
  pinchStartCenter = null;
});

renderer.domElement.addEventListener('mousedown', e => {
  touchStartX = e.clientX;
  touchStartY = e.clientY;
  touchStartTime = Date.now();
  previousTouch = { x: e.clientX, y: e.clientY };
  isDragging = true;
});

renderer.domElement.addEventListener('mousemove', e => {
  if (!isDragging || !moleculeGroup) return;
  moleculeGroup.rotation.y += (e.clientX - previousTouch.x) * 0.01;
  moleculeGroup.rotation.x += (e.clientY - previousTouch.y) * 0.01;
  previousTouch = { x: e.clientX, y: e.clientY };
});

renderer.domElement.addEventListener('mouseup', e => {
  const dx = Math.abs(e.clientX - touchStartX);
  const dy = Math.abs(e.clientY - touchStartY);
  if (dx < TAP_THRESHOLD && dy < TAP_THRESHOLD && Date.now() - touchStartTime < TAP_TIME) {
    onAtomTap(e.clientX, e.clientY);
  }
  isDragging = false;
});

renderer.domElement.addEventListener('wheel', e => {
  cameraZ = Math.max(3, Math.min(80, cameraZ + e.deltaY * 0.05));
  camera.position.z = cameraZ;
});

// ── Resize ────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── Animation loop ────────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}
animate();

// ── Flutter bridge ────────────────────────────────────────────────────────────
function loadLigand(jsonString) {
  try {
    const data = JSON.parse(jsonString);
    buildMolecule(data);
  } catch(e) {
    console.error('Failed to parse ligand data:', e);
  }
}

function getScreenshot() {
  renderer.render(scene, camera);
  return renderer.domElement.toDataURL('image/png');
}
</script>
</body>
</html>
